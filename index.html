#custom-prompt {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    z-index: 9999; 
    background: rgba(10, 10, 12, 0.85);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* Centrare simplă cu padding pentru tastatură */
    display: none;
    align-items: flex-start; 
    justify-content: center;
    padding-top: 15vh; 
    box-sizing: border-box;
}

.modal-content {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    padding: 30px;
    border-radius: 35px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    animation: modalAppear 0.3s ease-out;
}

@keyframes modalAppear {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}


#pw-input {
    background: rgba(0, 0, 0, 0.2) !important;
    border: 1px solid rgba(116, 0, 184, 0.3) !important;
    color: #fff !important;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    margin-top: 20px !important;
}

#pw-input:focus {
    border-color: var(--locked) !important;
    box-shadow: 0 0 15px rgba(116, 0, 184, 0.4), inset 0 2px 10px rgba(0,0,0,0.3);
}

.pin-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--locked);
    font-weight: 800;
    margin-bottom: 5px;
    display: block;
}




.text-locked {
    filter: blur(6px);
    user-select: none;         /* Previne selectarea textului */
    pointer-events: none;      /* Previne click/dreapta pe el */
    -webkit-user-select: none; /* Safari */
}


.hope-title { 
    font-family: 'Dancing Script', cursive;
    font-size: 3.9rem; /* Ajustat pentru a se potrivi în layout */
    margin: 0; 
    background: linear-gradient(45deg, #c9184a, #ff4d6d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.1);
    animation: floatTitle 3s ease-in-out infinite;
    display: inline-block;
}

@keyframes floatTitle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
}

/* Ajustare pentru ecrane mici */
@media (max-width: 480px) {
    .hope-title {
        font-size: 4.1rem;
    }
}


.search-container {
    margin-top: 20px; 
    padding: 0 25px !important; 
    height: 48px; 
    display: flex !important; /* Forțează layout de tip rând */
    flex-direction: row !important; /* Elementele stau unul lângă altul, nu sub altul */
    align-items: center !important; /* Aliniere verticală perfectă */
    gap: 12px;
    border-radius: 50px !important;
    min-height: unset !important;
}

/* Ne asigurăm că input-ul nu are margini care să îl împingă */
#search-input {
    margin: 0 !important;
    padding: 0 !important;
    line-height: normal !important;
}

function getSortedItems(items) {
    if (!searchTerm) return items;

    return [...items].sort((a, b) => {
        const scoreA = calculateScore(a, searchTerm);
        const scoreB = calculateScore(b, searchTerm);
        return scoreB - scoreA; // Cele cu scor mai mare primele
    });
}

function calculateScore(item, term) {
    let score = 0;
    const title = item.titlu.toLowerCase();
    const desc = item.desc.toLowerCase();

    // Potrivire exactă în titlu (Prioritate maximă)
    if (title.includes(term)) score += 100;
    // Potrivire exactă în descriere
    if (desc.includes(term)) score += 50;
    
    // Potriviri parțiale (cuvinte individuale)
    const words = term.split(" ");
    words.forEach(word => {
        if (word.length < 2) return;
        if (title.includes(word)) score += 10;
        if (desc.includes(word)) score += 5;
    });

    return score;
}


async function loadData() {
    let data;

    if (!USE_API) {
        // Folosim datele statice dacă API-ul este oprit
        data = MOCK_DATA;
        console.log("Aplicația rulează în mod OFFLINE (Constantă).");
    } else {
        // Preluăm datele reale din Supabase
        let { data: dbData, error } = await _supabase
            .from('users_data')
            .select('*')
            .eq('id', USER_ID)
            .single();

        if (error) {
            console.error("Eroare la încărcare:", error);
            return;
        }
        data = dbData;

        // Logica pentru acumulare retroactivă (doar în mod API)
        const acum = new Date();
        const ultimaActualizare = data.last_update ? new Date(data.last_update) : new Date();
        const luniDiferenta = (acum.getFullYear() - ultimaActualizare.getFullYear()) * 12 + (acum.getMonth() - ultimaActualizare.getMonth());

        if (luniDiferenta > 0) {
            const punctePerLuna = 10;
            const puncteDeAdaugat = luniDiferenta * punctePerLuna;
            const newPoints = data.points + puncteDeAdaugat;

            const { error: updateError } = await _supabase
                .from('users_data')
                .update({ points: newPoints, last_update: acum.toISOString() })
                .eq('id', USER_ID);

            if (!updateError) {
                data.points = newPoints;
                alert(`✨ Surpriză! Ai primit ${puncteDeAdaugat} credite.`);
            }
        }
    }

    renderUI(data);
}



function renderUI(userData) {
    // 1. Actualizăm creditele în HUD
    document.getElementById('balance').innerText = userData.points;
    
    // 2. Verificăm dacă secțiunea privată este deblocată (starea DOM)
    const isPrivateUnlocked = document.getElementById('private-grid').style.display === 'grid';
    
    // 3. Randăm Grila Publică
    const sortedPublic = getSortedItems(MENIU_PUBLIC);
    renderGrid('public-grid', sortedPublic, userData.points);
    
    // 4. Randăm Grila Privată (doar dacă e deblocată)
    if (isPrivateUnlocked) {
        const sortedPrivate = getSortedItems(MENIU_PRIVAT);
        renderGrid('private-grid', sortedPrivate, userData.points);
    }

    // 5. Randăm Istoricul (cu protecție pentru elementele private)
    const historyContainer = document.getElementById('history-list');
    
    if (userData.history && userData.history.length > 0) {
        historyContainer.innerHTML = userData.history.map(h => {
            // Extragem numele beneficiului și data
            const parti = h.split('(');
            const numeReal = parti[0].trim();
            const dataTranzactie = parti[1] ? parti[1].replace(')', '') : '';
            
            // Identificăm dacă acest beneficiu face parte din categoria Privată
            const estePrivat = MENIU_PRIVAT.some(item => item.titlu === numeReal);
            const trebuieProtejat = estePrivat && !isPrivateUnlocked;

            // Logica anti-trișat:
            // Dacă trebuie protejat, punem un text generic și aplicăm clasa de blur
            const textDeAfisat = trebuieProtejat ? "Tranzacție Privată" : numeReal;
            const clasaStil = trebuieProtejat ? "text-locked" : "";
            
            // Stil inline suplimentar pentru siguranță maximă
            const extraStyle = trebuieProtejat ? 'style="user-select: none; pointer-events: none;"' : '';

            return `
                <div class="history-item">
                    <span class="${clasaStil}" ${extraStyle}>
                        ✨ ${textDeAfisat}
                    </span>
                    <span style="opacity:0.4; font-size:0.7rem;">
                        ${dataTranzactie}
                    </span>
                </div>`;
        }).join('');
    } else {
        historyContainer.innerHTML = '<p style="font-size:0.8rem; opacity:0.5; text-align:center;">Nicio achiziție înregistrată.</p>';
    }
}



function renderGrid(containerId, items, currentPoints) {
    const container = document.getElementById(containerId);
    const sectionType = containerId.split('-')[0];
    
    // Dacă se caută ceva, ignorăm limita de 3 și arătăm tot ce e relevant
    const isExpanded = expanded[sectionType] || searchTerm.length > 0;
    
    const itemsToShow = isExpanded ? items : items.slice(0, 2);
    
    // Randăm cardurile
    container.innerHTML = itemsToShow.map(item => `
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:15px;">
                <h3 style="margin:0; font-size:1.1rem; line-height:1.2;">${item.titlu}</h3>
                <span class="price-tag">${item.pret} CREDITS</span>
            </div>
            <p style="font-size:0.85rem; opacity:0.6; line-height:1.5; margin:0;">${item.desc}</p>
            <button class="btn-glass" 
                ${currentPoints < item.pret ? 'disabled' : ''} 
                onclick="buy('${item.titlu}', ${item.pret})">
                ${currentPoints < item.pret ? 'Insuficient' : 'Redeem'}
            </button>
        </div>
    `).join('');

    // Logică pentru butonul "Vezi tot / Vezi mai puțin"
    const btnMore = document.getElementById(`btn-more-${sectionType}`);
    if (items.length > 2) {
        btnMore.style.display = 'block';
        btnMore.innerText = isExpanded ? "Arată mai puține" : `Vezi tot (+${items.length - 2})`;
    } else {
        btnMore.style.display = 'none';
    }
}
